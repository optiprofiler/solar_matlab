name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: MATLAB ${{ matrix.matlab-release }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        matlab-release: [R2023b, R2024b]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout OptiProfiler
        uses: actions/checkout@v4
        with:
          repository: optiprofiler/optiprofiler
          path: optiprofiler
          ref: main

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.matlab-release }}

      - name: Set up MSYS2 toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: make mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 tools to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Regenerate MATLAB probinfo
        uses: matlab-actions/run-command@v2
        with:
          command: "run('scripts/collect_info.m')"

      - name: Check committed probinfo
        run: |
          git diff --exit-code probinfo_matlab.csv probinfo_matlab.mat

      - name: Build SOLAR runtime
        shell: bash
        run: |
          mkdir -p runtime/solar/bin
          exe_ext=""
          libs_arg=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            exe_ext=".exe"
            libs_arg="LIBS=-lm"
          fi
          make -C runtime/solar/src EXEEXT="$exe_ext" $libs_arg
          test -f "runtime/solar/bin/solar$exe_ext"

      - name: Run MATLAB smoke test
        uses: matlab-actions/run-command@v2
        with:
          command: "run('tests/smoke_solar_matlab.m')"

      - name: Ensure generated runtime artifacts are not tracked changes
        if: always()
        shell: bash
        run: |
          rm -f runtime/solar/bin/solar runtime/solar/bin/solar.exe runtime/solar/src/*.o
          rm -rf runtime/solar/.build.lock.d
          rm -rf optiprofiler
          git status --short
          test -z "$(git status --short)"
