name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout OptiProfiler
        uses: actions/checkout@v4
        with:
          repository: optiprofiler/optiprofiler
          path: optiprofiler
          ref: main

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a

      - name: Regenerate MATLAB probinfo
        uses: matlab-actions/run-command@v2
        with:
          command: "run('scripts/collect_info.m')"

      - name: Check committed probinfo
        run: |
          git diff --exit-code probinfo_matlab.csv probinfo_matlab.mat

      - name: Build SOLAR runtime
        run: |
          mkdir -p runtime/solar/bin
          make -C runtime/solar/src
          test -x runtime/solar/bin/solar

      - name: Run MATLAB smoke test
        uses: matlab-actions/run-command@v2
        with:
          command: "run('tests/smoke_solar_matlab.m')"

      - name: Ensure generated runtime artifacts are not tracked changes
        if: always()
        run: |
          rm -f runtime/solar/bin/solar runtime/solar/src/*.o
          rm -rf runtime/solar/.build.lock.d
          rm -rf optiprofiler
          git status --short
          test -z "$(git status --short)"
